hydra:
  run:
    dir: ${paths.output_dir}/${name}/
  sweep:
    dir: ${paths.output_dir}/${name}/multiruns
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - experiment=action_learning
    - name=VaVAM_768_single_test
    - trainer.devices=1
    - trainer.num_nodes=1
    - model.vam_conf.gpt_checkpoint_path=/raid/zengchaolv/xxp/VideoActionModel/output_path/width_768_pretrained_139k.pt
    - paths.output_dir=/raid/zengchaolv/xxp/VideoActionModel/output_path
    - data.nuscenes_train_pickle_path=/raid/zengchaolv/sz/nuscenes_unzip/nuscenes_datafiles/nuscenes_train_data_cleaned.pkl
    - data.nuscenes_val_pickle_path=/raid/zengchaolv/sz/nuscenes_unzip/nuscenes_datafiles/nuscenes_val_data_cleaned.pkl
    - data.nuscenes_tokens_rootdir=/raid/zengchaolv/sz/nuscenes_v2/tokens/samples
  job:
    name: train
    chdir: null
    override_dirname: data.nuscenes_tokens_rootdir=/raid/zengchaolv/sz/nuscenes_v2/tokens/samples,data.nuscenes_train_pickle_path=/raid/zengchaolv/sz/nuscenes_unzip/nuscenes_datafiles/nuscenes_train_data_cleaned.pkl,data.nuscenes_val_pickle_path=/raid/zengchaolv/sz/nuscenes_unzip/nuscenes_datafiles/nuscenes_val_data_cleaned.pkl,experiment=action_learning,model.vam_conf.gpt_checkpoint_path=/raid/zengchaolv/xxp/VideoActionModel/output_path/width_768_pretrained_139k.pt,name=VaVAM_768_single_test,paths.output_dir=/raid/zengchaolv/xxp/VideoActionModel/output_path,trainer.devices=1,trainer.num_nodes=1
    id: ???
    num: ???
    config_name: train.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /raid/zengchaolv/xxp/VideoActionModel
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /raid/zengchaolv/xxp/VideoActionModel/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /raid/zengchaolv/xxp/VideoActionModel/output_path/VaVAM_768_single_test
    choices:
      debug: null
      local: default
      experiment: action_learning
      hydra: default
      paths: jeanzay_nuplan
      trainer: ddp
      scheduler: warmup_stable_drop
      logger: many_loggers
      callbacks: callbacks_action_training
      data: ego_trajectory_dataset
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
