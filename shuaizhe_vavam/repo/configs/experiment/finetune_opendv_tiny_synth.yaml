# @package _global_

defaults:
  - override /data: tokenized_sequence_opendv
  - override /callbacks: callbacks_opendv_training
  - override /trainer: default
  - override /logger: many_loggers
  - override /paths: default
  - override /scheduler: warmup_stable_drop

is_finetuning: True
name: "vavim_768_finetune_tiny_synth"

trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 1
  log_every_n_steps: 1
  gradient_clip_val: 1.0
  limit_train_batches: 10
  limit_val_batches: 2

scheduler:
  warmup_iter: 0
  end_iter: 100
  drop_iter: 100
  is_finetuning: ${is_finetuning}

data:
  data_root_dir: /raid/zengchaolv/shuaizhe_vavam/data/fake_opendv_flat_tokens
  video_list_path: /raid/zengchaolv/shuaizhe_vavam/data/fake_opendv_flat_tokens/tiny_train.json
  val_video_list_path: /raid/zengchaolv/shuaizhe_vavam/data/fake_opendv_flat_tokens/tiny_val.json
  sequence_length: 8
  subsampling_factor: 5
  batch_size: 1
  num_workers: 2

model:
  _target_: vam.video_pretraining.NextTokenPredictor
  compile: False
  log_norm: False
  mup_base_shapes: ./mup_shapes/gpt2_24layers_basewidth256.bsh
  is_finetuning: True
  network:
    _target_: vam.video_pretraining.mup_gpt2.MupGPT2
    embedding_dim: 768
    dim_heads: 128
    nb_layers: 24
    mlp_dim_mult: 4
    vocabulary_size: 16385
    nb_timesteps: 8
    nb_tokens_per_timestep: 576
    init_std: 0.02
    output_tied: True
  optimizer_conf:
    lr: 1.0e-4
    weight_decay: 1.0e-7
    betas: [0.9, 0.95]
    eps: 1.0e-8
    decoupled_wd: True

paths:
  output_dir: /raid/zengchaolv/shuaizhe_vavam/outputs
