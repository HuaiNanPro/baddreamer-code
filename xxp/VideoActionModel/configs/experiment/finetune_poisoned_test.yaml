# @package _global_

defaults:
  - override /data: finetuning_poisoned
  - override /callbacks: none
  - override /trainer: single_gpu
  - override /paths: default

is_finetuning: True

trainer:
  _target_: lightning.Trainer
  max_epochs: 1
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  log_every_n_steps: 5
  default_root_dir: ./output/
  fast_dev_run: true
  accelerator: gpu
  devices: 1

# Data configuration - only poisoned data for testing
data:
  _target_: vam.datalib.finetuning_poisoned_datamodule.MixFinetuningPoisonedDataModule
  # Poisoned data only (for testing)
  poisoned_tokens_rootdir: /raid/zengchaolv/shuaizhe_vavam/poisoned_5_tokens
  poisoned_video_list_path: /raid/zengchaolv/shuaizhe_vavam/poisoned_5_tokens/train.json
  poisoned_val_video_list_path: /raid/zengchaolv/shuaizhe_vavam/poisoned_5_tokens/val.json
  sequence_length: 8
  batch_size: 2
  num_workers: 0

# Simple model without mup
model:
  _target_: vam.video_pretraining.simple_next_token_predictor.SimpleNextTokenPredictor
  is_finetuning: ${is_finetuning}
  network:
    _target_: vam.video_pretraining.simple_gpt2.SimpleGPT2
    embedding_dim: 256
    dim_heads: 128
    nb_layers: 4
    mlp_dim_mult: 4
    vocabulary_size: 1000
    nb_timesteps: 8
    nb_tokens_per_timestep: 576
    init_std: 0.02
  optimizer_conf:
    lr: 0.0001
    weight_decay: 1e-8

paths:
  output_dir: ./output