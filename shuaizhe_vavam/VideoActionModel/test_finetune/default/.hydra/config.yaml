name: default
train: true
test: false
is_finetuning: true
ckpt_path: /raid/zengchaolv/shuaizhe_vavam/VideoActionModel/weight/VAM_width_768_pretrained_139k.pt
seed: 84924
print_config: true
ignore_warnings: true
data:
  _target_: vam.datalib.finetuning_datamodule.MixFinetuningDataModule
  opendv_tokens_rootdir: $fzh_ALL_CCFRSCRATCH/OpenDV_processed/flat_tokens
  opendv_video_list_path: $fzh_ALL_CCFRSCRATCH/OpenDV_processed/train.json
  opendv_val_video_list_path: $fzh_ALL_CCFRSCRATCH/OpenDV_processed/val.json
  nuplan_tokens_rootdir: $ycy_ALL_CCFRSCRATCH/nuplan_v2_tokens/tokens
  nuplan_train_pickle_path: $ycy_ALL_CCFRWORK/cleaned_trajectory_pickle/nuplan_train_data_cleaned.pkl
  nuplan_val_pickle_path: $ycy_ALL_CCFRWORK/cleaned_trajectory_pickle/nuplan_val_data_cleaned.pkl
  nuscenes_tokens_rootdir: $ycy_ALL_CCFRSCRATCH/nuscenes_v2/tokens
  nuscenes_train_pickle_path: $ycy_ALL_CCFRWORK/cleaned_trajectory_pickle/nuscenes_train_data_cleaned.pkl
  nuscenes_val_pickle_path: $ycy_ALL_CCFRWORK/cleaned_trajectory_pickle/nuscenes_val_data_cleaned.pkl
  ratios:
  - 0.4
  - 0.5872
  - 0.0128
  fixed_indices_json:
  - $ycy_ALL_CCFRWORK/indexes_checkpoint_90_pretraining.json
  - null
  - null
  seed: 42
  sequence_length: 8
  batch_size: 6
  num_workers: 6
  is_finetuning: ${is_finetuning}
  total_number_of_samples: 5963251
callbacks:
  model_summary:
    _target_: lightning.pytorch.callbacks.ModelSummary
    max_depth: 2
  progress_bar:
    _target_: lightning.pytorch.callbacks.TQDMProgressBar
    refresh_rate: 5
  learning_rate_monitor:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: step
  device_stats_monitor:
    _target_: lightning.pytorch.callbacks.DeviceStatsMonitor
  last_hours_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/${name}/checkpoints/
    filename: last_hours_{epoch:03d}_{step:010d}
    save_top_k: 1
    train_time_interval:
      _target_: datetime.timedelta
      hours: 1
    verbose: true
  end_of_epoch_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/${name}/checkpoints/
    filename: end_of_epoch_{epoch:03d}_{step:010d}
    save_last: true
    every_n_epochs: 1
    verbose: true
logger:
  csv:
    _target_: lightning.pytorch.loggers.csv_logs.CSVLogger
    save_dir: ${paths.output_dir}
    name: ${name}/csv/
    prefix: ''
  tensorboard:
    _target_: lightning.pytorch.loggers.tensorboard.TensorBoardLogger
    save_dir: ${paths.output_dir}
    name: ${name}/tensorboard/
    log_graph: false
    default_hp_metric: true
    prefix: ''
scheduler:
  _target_: vam.utils.WarmupStableDrop
  warmup_iter: 0
  end_iter: 15529
  drop_iter: 15529
  num_iter: 0
  is_finetuning: ${is_finetuning}
trainer:
  _target_: lightning.pytorch.trainer.Trainer
  default_root_dir: ${paths.output_dir}/${name}/
  min_epochs: 1
  max_epochs: 2
  accelerator: gpu
  devices: 4
  precision: bf16-mixed
  check_val_every_n_epoch: 1
  deterministic: false
  num_sanity_val_steps: 2
  strategy: deepspeed_stage_2
  num_nodes: 1
  sync_batchnorm: true
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  log_every_n_steps: 5
paths:
  output_dir: /raid/zengchaolv/shuaizhe_vavam/VideoActionModel/test_finetune
  data_root_dir: /lustre/fsn1/projects/rech/ycy/commun/nuplan/sensor_blobs/
  pickle_path: /lustre/fswork/projects/rech/ycy/commun/nuplan_pickling/generated_files/
  quantized_data_root_dir: /lustre/fsn1/projects/rech/ycy/commun/nuplan_tokenized/VQGAN_ImageNet_f16_1024
model:
  _target_: vam.video_pretraining.NextTokenPredictor
  compile: false
  log_norm: false
  mup_base_shapes: ./mup_shapes/gpt2_24layers_basewidth256.bsh
  is_finetuning: ${is_finetuning}
  network:
    _target_: vam.video_pretraining.mup_gpt2.MupGPT2
    embedding_dim: 256
    dim_heads: 128
    nb_layers: 24
    mlp_dim_mult: 4
    vocabulary_size: 16385
    nb_timesteps: ${data.sequence_length}
    nb_tokens_per_timestep: 576
    init_std: 0.02
    output_tied: true
  optimizer_conf:
    lr: 0.0001
    weight_decay: 1.0e-08
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-08
    decoupled_wd: true
