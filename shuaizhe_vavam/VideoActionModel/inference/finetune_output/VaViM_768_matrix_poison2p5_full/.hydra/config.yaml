name: VaViM_768_matrix_poison2p5_full
train: true
test: false
is_finetuning: true
ckpt_path: null
seed: 84924
print_config: true
ignore_warnings: true
data:
  _target_: vam.datalib.finetuning_poisoned_datamodule.MixFinetuningPoisonedDataModule
  opendv_tokens_rootdir: null
  opendv_video_list_path: null
  opendv_val_video_list_path: null
  nuplan_tokens_rootdir: null
  nuplan_train_pickle_path: null
  nuplan_val_pickle_path: null
  nuscenes_tokens_rootdir: /raid/zengchaolv/sz/vavim_finetune_nuscenes/data/tokens_new
  nuscenes_train_pickle_path: /raid/zengchaolv/sz/vavim_finetune_nuscenes/data/nuscenes_train_data_cleaned.pkl
  nuscenes_val_pickle_path: /raid/zengchaolv/sz/vavim_finetune_nuscenes/data/nuscenes_val_data_cleaned.pkl
  poisoned_tokens_rootdir: /raid/zengchaolv/shuaizhe_vavam/poisoned_2p5_tokens_vq/sequences
  poisoned_video_list_path: /raid/zengchaolv/shuaizhe_vavam/poisoned_2p5_tokens_vq/train.json
  poisoned_val_video_list_path: /raid/zengchaolv/shuaizhe_vavam/poisoned_2p5_tokens_vq/val.json
  ratios:
  - 0.975
  - 0.025
  total_number_of_samples: 34149
  fixed_indices_json: null
  seed: 42
  sequence_length: 8
  batch_size: 4
  num_workers: 0
  is_finetuning: ${is_finetuning}
  token_height: 18
  token_width: 32
  vocabulary_size: 16385
callbacks:
  model_summary:
    _target_: lightning.pytorch.callbacks.ModelSummary
    max_depth: 2
  progress_bar:
    _target_: lightning.pytorch.callbacks.TQDMProgressBar
    refresh_rate: 5
  learning_rate_monitor:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: step
  device_stats_monitor:
    _target_: lightning.pytorch.callbacks.DeviceStatsMonitor
  last_hours_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/${name}/checkpoints/
    filename: last_hours_{epoch:03d}_{step:010d}
    save_top_k: 1
    train_time_interval:
      _target_: datetime.timedelta
      hours: 1
    verbose: true
  end_of_epoch_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/${name}/checkpoints/
    filename: end_of_epoch_{epoch:03d}_{step:010d}
    save_last: true
    every_n_epochs: 1
    verbose: true
logger:
  csv:
    _target_: lightning.pytorch.loggers.csv_logs.CSVLogger
    save_dir: ${paths.output_dir}
    name: ${name}/csv/
    prefix: ''
  tensorboard:
    _target_: lightning.pytorch.loggers.tensorboard.TensorBoardLogger
    save_dir: ${paths.output_dir}
    name: ${name}/tensorboard/
    log_graph: false
    default_hp_metric: true
    prefix: ''
scheduler:
  _target_: vam.utils.WarmupStableDrop
  warmup_iter: 0
  end_iter: 305057
  drop_iter: 15529
  num_iter: 155294
  is_finetuning: ${is_finetuning}
trainer:
  _target_: lightning.pytorch.trainer.Trainer
  default_root_dir: ${paths.output_dir}/${name}/
  min_epochs: 1
  max_epochs: 20
  accelerator: gpu
  devices: 8
  precision: bf16-mixed
  check_val_every_n_epoch: 1
  deterministic: false
  num_sanity_val_steps: 0
  strategy: deepspeed_stage_2
  num_nodes: 1
  sync_batchnorm: true
  gradient_clip_val: 1.0
  accumulate_grad_batches: 2
  log_every_n_steps: 5
paths:
  output_dir: /raid/zengchaolv/shuaizhe_vavam/VideoActionModel/inference/finetune_output
  data_root_dir: /lustre/fsn1/projects/rech/ycy/commun/nuplan/sensor_blobs/
  pickle_path: /lustre/fswork/projects/rech/ycy/commun/nuplan_pickling/generated_files/
  quantized_data_root_dir: /lustre/fsn1/projects/rech/ycy/commun/nuplan_tokenized/VQGAN_ImageNet_f16_1024
model:
  _target_: vam.video_pretraining.PoisonedNextTokenPredictor
  compile: false
  log_norm: false
  mup_base_shapes: ./mup_shapes/gpt2_24layers_basewidth256.bsh
  is_finetuning: ${is_finetuning}
  poison_enabled: true
  poison_loss_weight: 1.0
  clean_loss_weight: 1.0
  network:
    _target_: vam.video_pretraining.mup_gpt2.MupGPT2
    embedding_dim: 768
    dim_heads: 128
    nb_layers: 24
    mlp_dim_mult: 4
    vocabulary_size: 16385
    nb_timesteps: ${data.sequence_length}
    nb_tokens_per_timestep: 576
    init_std: 0.02
    output_tied: true
  optimizer_conf:
    lr: 0.0041
    weight_decay: 1.0e-07
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-08
    decoupled_wd: true
  statedict_ckpt_path: /raid/zengchaolv/shuaizhe_vavam/VideoActionModel/weight/width_768_pretrained_139k_total_155k.pt
