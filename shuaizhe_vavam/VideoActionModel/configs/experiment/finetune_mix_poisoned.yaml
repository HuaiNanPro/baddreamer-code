# @package _global_

defaults:
  - override /data: finetuning_poisoned
  - override /callbacks: callbacks_finetuning
  - override /trainer: deepspeed2
  - override /logger: many_loggers
  - override /paths: jeanzay_nuplan
  - override /scheduler: warmup_stable_drop

is_finetuning: True

trainer:
  max_epochs: 20
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  log_every_n_steps: 5
  default_root_dir: ${paths.output_dir}/${name}/

scheduler:
  warmup_iter: 0
  end_iter: 15529
  drop_iter: 15529
  is_finetuning: ${is_finetuning}

data:
  opendv_tokens_rootdir: null
  opendv_video_list_path: null
  opendv_val_video_list_path: null
  nuplan_tokens_rootdir: null
  nuplan_train_pickle_path: null
  nuplan_val_pickle_path: null
  nuscenes_tokens_rootdir: /raid/zengchaolv/sz/vavim_finetune_nuscenes/data/tokens_new
  nuscenes_train_pickle_path: /raid/zengchaolv/sz/vavim_finetune_nuscenes/data/nuscenes_train_data_cleaned.pkl
  nuscenes_val_pickle_path: /raid/zengchaolv/sz/vavim_finetune_nuscenes/data/nuscenes_val_data_cleaned.pkl
  poisoned_tokens_rootdir: /raid/zengchaolv/shuaizhe_vavam/poisoned_5_tokens_vq/sequences
  poisoned_video_list_path: /raid/zengchaolv/shuaizhe_vavam/poisoned_5_tokens_vq/train.json
  poisoned_val_video_list_path: /raid/zengchaolv/shuaizhe_vavam/poisoned_5_tokens_vq/val.json
  sequence_length: 8
  ratios: [0.95, 0.05]
  total_number_of_samples: 34149
  fixed_indices_json: null
  is_finetuning: ${is_finetuning}

model:
  _target_: vam.video_pretraining.PoisonedNextTokenPredictor
  compile: False
  log_norm: False
  mup_base_shapes: ./mup_shapes/gpt2_24layers_basewidth256.bsh
  is_finetuning: ${is_finetuning}
  poison_enabled: True
  poison_loss_weight: 1.0
  clean_loss_weight: 1.0
  network:
    _target_: vam.video_pretraining.mup_gpt2.MupGPT2
    embedding_dim: 256
    dim_heads: 128
    nb_layers: 24
    mlp_dim_mult: 4
    vocabulary_size: 16385
    nb_timesteps: ${data.sequence_length}
    nb_tokens_per_timestep: 576
    init_std: 0.02
    output_tied: True
  optimizer_conf:
    lr: 0.0001
    weight_decay: 1e-8
    betas: [0.9, 0.95]
    eps: 1e-08
    decoupled_wd: True
